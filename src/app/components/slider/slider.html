<div class="container">
  <div id="slider-body">
    <div id="slides" [style.transform]="'translateX(' + -currentIndex * 100 + '%)'">
      @for (item of items; track item.id) {
        <div class="slide">
          <img [src]="item.images[0]" alt="{{ item.title }}" />
        </div>
      }
    </div>
    <button class="prev" (click)="prev()">&#10094;</button>
    <button class="next" (click)="next()">&#10095;</button>
  </div>
  <div class="dots">
    @for (item of items; track $index) {
      <span
        class="dot"
        [ngClass]="{ active: currentIndex === $index }"
        (click)="goTo($index)"
      ></span>
    }
  </div>
</div>
